name: Daily Market Data Update

on:
  schedule:
    - cron: '30 22 * * 0-4'  # 7:30 AM KST Mon-Fri (= 전날 22:30 UTC)
    - cron: '35 6 * * 1-5'   # 3:35 PM KST Mon-Fri (= 06:35 UTC)
  workflow_dispatch:           # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Fetch KR data
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: python fetch_kr.py

      - name: Fetch US data
        env:
          FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
        run: python fetch_us.py
